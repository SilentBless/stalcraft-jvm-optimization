name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Extract changelog from tag
        id: changelog
        shell: bash
        run: |
          {
            echo 'body<<CHANGELOG_EOF'
            git tag -l --format='%(contents)' "$GITHUB_REF_NAME"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Install go-winres
        run: go install github.com/tc-hib/go-winres@latest

      - name: Patch version from tag
        working-directory: wrapper
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION%%-*}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          MAJOR="${MAJOR:-0}" MINOR="${MINOR:-0}" PATCH="${PATCH:-0}"
          FILE_VER="$MAJOR.$MINOR.$PATCH.0"

          python3 -c "
          import json, sys
          with open('winres/winres.json', 'r') as f:
              data = json.load(f)
          data['RT_MANIFEST']['#1']['0409']['identity']['version'] = '$FILE_VER'
          data['RT_VERSION']['#1']['0000']['fixed']['file_version'] = '$FILE_VER'
          data['RT_VERSION']['#1']['0000']['fixed']['product_version'] = '$FILE_VER'
          data['RT_VERSION']['#1']['0000']['info']['0409']['FileVersion'] = '$VERSION'
          data['RT_VERSION']['#1']['0000']['info']['0409']['ProductVersion'] = '$VERSION'
          with open('winres/winres.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

      - name: Embed version info
        working-directory: wrapper
        run: go-winres make

      - name: Build
        working-directory: wrapper
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -o wrapper.exe -ldflags="-s -w" .

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: |
            wrapper/wrapper.exe
            configs/*
