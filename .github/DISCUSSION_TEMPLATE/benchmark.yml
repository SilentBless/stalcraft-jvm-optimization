title: "[Benchmark] <CPU> + <RAM MT/s> + <config>"
labels: ["benchmark", "community-data"]
body:
  - type: markdown
    attributes:
      value: |
        Спасибо за вклад в проект!

        **Перед отправкой** прочитайте [BENCHMARKS.md](https://github.com/EXBO-Community/stalcraft-jvm-optimization/blob/master/docs/BENCHMARKS.md) — там описан протокол теста. Соблюдение протокола критично: иначе данные не сравнимы с другими замерами.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Обязательные проверки
      options:
        - label: Я прочитал BENCHMARKS.md
          required: true
        - label: Длительность записи = 360 секунд, задержка старта = 5 секунд
          required: true
        - label: Закрыл Discord / Telegram / оверлеи / OBS на время теста
          required: true
        - label: Тест не на пустом морятнике
          required: true
        - label: Локация наполнилась игроками до старта записи
          required: true

  - type: input
    id: os
    attributes:
      label: Версия Windows
      placeholder: "Windows 11 23H2"
    validations:
      required: true

  - type: textarea
    id: config-body
    attributes:
      label: Содержимое конфига
      description: JSON из `jvm_wrapper/configs/<имя>.json`.
      render: json
    validations:
      required: true

  - type: textarea
    id: capframex-links
    attributes:
      label: Ссылки на CapFrameX JSON-записи
      description: |
        Перетащи файлы прямо в это поле (GitHub загрузит их) или вставь ссылки на Google Drive / файлообменник. Если прогонов несколько — перечисли все.
    validations:
      required: true

  - type: textarea
    id: perception
    attributes:
      label: Субъективные ощущения
      description: |
        "Плавно", "иногда тычки", "фризы в бою", "микрофризы при смене зоны" — что угодно, что ощущается во время игры. Метрики показывают цифры, но восприятие тоже важно.
      placeholder: |
        В толпе на морятнике ощущается плавно. Изредка дёргается при повороте камерой.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Дополнительные замечания
      description: |
        Антивирус, разгон, XMP/DOCP включён или нет, что-то необычное в окружении — всё, что может повлиять на результат.
    validations:
      required: false
